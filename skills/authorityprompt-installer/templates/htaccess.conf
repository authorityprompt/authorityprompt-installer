# AuthorityPrompt — Apache .htaccess for /.well-known/
#
# Drop this file at: <web-root>/.well-known/.htaccess
# This sets the correct Content-Type for the 5 AP files. Apache by default
# serves .jsonld / .yaml / .md as application/octet-stream which AI parsers
# silently ignore — these AddType lines fix that without touching httpd.conf.
#
# Safe to leave in place permanently. Affects only files inside .well-known/.

<IfModule mod_mime.c>
  AddType application/ld+json   .jsonld
  AddType application/yaml      .yaml
  AddType text/markdown         .md
  AddType text/plain            .txt
  AddType text/html             .html
</IfModule>

# Allow public read access to the 5 AP files explicitly. Some shared hosts
# block dotfile/dotdir access by default; this whitelist re-enables what we need.
<FilesMatch "^authorityprompt\.(jsonld|yaml|md|txt|html)$">
  Require all granted
</FilesMatch>

# Sensible cache: 1 hour at edge + browser, with `must-revalidate` so
# AuthorityPrompt updates are picked up promptly when content_hash changes.
<IfModule mod_headers.c>
  <FilesMatch "^authorityprompt\.(jsonld|yaml|md|txt|html)$">
    Header set Cache-Control "public, max-age=3600, must-revalidate"
  </FilesMatch>
</IfModule>
