<!--
  AuthorityPrompt head snippet — paste this inside <head> of EVERY public page.
  Replace the two placeholders before pasting:
    {{DOMAIN}} — your bare hostname, e.g. example.com (no protocol, no path)
    {{TOKEN}}  — verification token from your AuthorityPrompt dashboard
-->

<!-- 1. Domain ownership proof (so AuthorityPrompt can independently verify you own this site) -->
<meta name="authorityprompt-verification" content="{{TOKEN}}">

<!-- 2. Backlink to canonical AI-readable profile (so AI crawlers can discover the canonical source) -->
<link rel="ai-profile" href="https://authorityprompt.com/company/{{DOMAIN}}">

<!-- 3. AP sync script — sends bot-visit pings to your dashboard, injects canonical JSON-LD -->
<script src="https://authorityprompt.com/api/ingest-generator/company/{{DOMAIN}}/authorityprompt.js" async></script>
